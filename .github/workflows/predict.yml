name: Auto Predict and Update

on:
  schedule:
    - cron: '0 */4 * * *'  # Run every 4 hours
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write

jobs:
  predict-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git versioning if needed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: examples/my_kronos_cache
          key: ${{ runner.os }}-hf-models-v1

      - name: Create Virtual Environment and Install Dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Prediction Script
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          chmod +x scripts/run.sh
          # Activate venv explicitly as the script expects it in ../.venv
          source .venv/bin/activate
          # Run the script with upload flag
          ./scripts/run.sh -m all -u

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add the predictions file
          git add web/public/predictions.json
          
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "chore: update predictions data $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes to commit"
          fi
